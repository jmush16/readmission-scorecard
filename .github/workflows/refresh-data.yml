name: Refresh CMS data snapshot

# CMS provider-data (HRRP, Unplanned Visits, Hospital Info, SNF QRP, Home Health)
# updates roughly annually/quarterly. Re-pull monthly and open a PR so the data
# change — including the post-acute join coverage — is reviewable before it ships.
on:
  schedule:
    - cron: "0 9 1 * *" # 09:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:data
      - run: npm test
      - name: Open PR if the snapshot changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Refresh CMS data snapshot"
          title: "Refresh CMS data snapshot"
          body: |
            Automated monthly refresh of the CMS snapshot (HRRP, Unplanned Visits,
            Hospital General Info, SNF Quality Reporting, Home Health).
            Review the diff under `public/data/` before merging — check the build
            log's post-acute counts (SNFs, state-counties, home-health agencies)
            for any large coverage drop that would signal a CMS schema change.
          branch: data/refresh
          delete-branch: true
