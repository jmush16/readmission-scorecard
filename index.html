<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Readmission Reality Check</title>
  <meta name="description" content="Your hospital's 30-day readmission performance, assembled from public CMS data and ranked against your state peers. Non-PHI.">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="tool-lockup" aria-label="Tool title">
        <strong>Readmission Reality Check</strong>
        <span>CMS readmission data, assembled and ranked against your peers.</span>
      </div>
      <div class="top-actions">
        <button class="button" type="button" id="restart" hidden>Start over</button>
      </div>
    </header>

    <main class="wrap" id="root"></main>

    <footer class="footer">
      <span id="provenance" class="provenance"></span>
      <a id="contactCta" href="mailto:joel@enduranthealthspan.com?subject=Readmission%20pilot">Run this on your real panel</a>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
